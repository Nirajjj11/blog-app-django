{% extends 'base.html' %}

{% block content %}

<h2>Pending Blogs (Editor Panel)</h2>

{% for blog in object_list %}
<div class="card mb-3 shadow-sm">
      <div class="card-body">

            <h4>{{ blog.title }}</h4>
            <p>{{ blog.body|truncatewords:20 }}</p>
            <p><strong>Author:</strong> {{ blog.author }}</p>

            <a href="{% url 'blog_detail' blog.pk %}" class="btn btn-primary">
                  View
            </a>

            <a href="{% url 'approve_blog' blog.pk %}" class="btn btn-success">
                  Approve
            </a>

            <a href="{% url 'reject_blog' blog.pk %}" class="btn btn-danger">
                  Reject
            </a>

      </div>
</div>
{% empty %}
<p>No pending blogs.</p>
{% endfor %}

{% endblock %}
