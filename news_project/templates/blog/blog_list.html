{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
      <h2>All Blogs</h2>

      {% if user.is_authenticated %}
      <a href="{% url 'blog_new' %}" class="btn btn-primary">+ New Blog</a>
      {% endif %}
</div>

{% for blog in blogs %}
<div class="card mb-3 shadow-sm">
      <div class="card-body">
            <h4>
                  <a href="{{ blog.get_absolute_url }}">
                        {{ blog.title }}
                  </a>
            </h4>
            <p class="text-muted">By {{ blog.author }}</p>
            <p>{{ blog.body|truncatewords:25 }}</p>
      </div>
</div>
{% empty %}
<p>No blogs published yet.</p>
{% endfor %}

{% endblock %}
